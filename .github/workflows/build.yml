name: Build and Test
on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  test-go:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: '^1.21.5'
      - name: Go Test ${{ matrix.os }}
        run: go test -v ./...

  test-java:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
    steps:
      - uses: actions/checkout@v5
        with:
          repository: mharbol/java-json
          path: java-json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Checkout JSON ${{ matrix.os }}
        uses: actions/checkout@v5
        with:
          repository: mharbol/java-json
          path: java-json
      - name: Build JSON ${{ matrix.os }}
        run: mvn clean install -f java-json/pom.xml

      - uses: actions/checkout@v5
      - name: Build Java LSP ${{ matrix.os }}
        run: mvn clean install

